<?php
// دالة لاستدعاء كل ملفات HTML داخل المجلدات الفرعية
function getHtmlFiles($dir) {
    $files = [];
    $items = scandir($dir); // جلب كل العناصر داخل المجلد
    foreach ($items as $item) {
        if ($item === '.' || $item === '..') continue; // تجاهل المجلدات الخاصة
        $path = $dir . '/' . $item;
        if (is_dir($path)) {
            // إذا كان مجلد، استدعاء الدالة بشكل متكرر
            $files = array_merge($files, getHtmlFiles($path));
        } elseif (substr($item, -5) === '.html') {
            // إذا كانت صفحة HTML، أضفها للقائمة
            $files[] = $path;
        }
    }
    return $files;
}

// تحديد مجلد الجذر (حيث توجد الصفحات)
$rootDir = __DIR__;

// جلب كل ملفات HTML داخل الموقع
$htmlFiles = getHtmlFiles($rootDir);

if (!empty($htmlFiles)) {
    // اختيار صفحة عشوائية
    $randomFile = $htmlFiles[array_rand($htmlFiles)];

    // تحويل المستخدم للصفحة العشوائية
    // استخراج المسار النسبي من المجلد الجذر لتجنب مشاكل URLs
    $relativePath = str_replace($_SERVER['DOCUMENT_ROOT'], '', $randomFile);
    header("Location: $relativePath");
    exit;
} else {
    // إذا لم توجد صفحات HTML
    echo "<!DOCTYPE html>
<html lang='ar'>
<head>
    <meta charset='UTF-8'>
    <title>صفحة غير موجودة</title>
</head>
<body>
    <h1>صفحة غير موجودة!</h1>
    <p>لا توجد صفحات داخلية لإعادة التوجيه.</p>
</body>
</html>";
}
?>
